name: Node.js CI

on:
  push:
    # Publish `main` as Docker `latest` image.
    branches:
      - main

    # Publish `v1.2.3` tags as releases.
    tags:
      - v*

  pull_request:
    branches:
      - main

jobs:
  checkAndBuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: linter
        run: pnpm lint

      - name: build ts files
        run: pnpm build

      - name: Archive builded js
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  dockerize:
    runs-on: ubuntu-latest
    needs: checkAndBuild
    env:
      IMAGE_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get lite node_modules
        run: pnpm install --prod --frozen-lockfile

      - name: Download builded app
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Prepare variables
        id: prepare-variables
        run: |
          IMAGE_ID=${{ secrets.DOCKER_REGISTRY_HOST }}/$IMAGE_NAME

          # Change all uppercase to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
            
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
            
          # Use Docker `latest` tag convention
          [ "$VERSION" == "main" ] && VERSION=latest

          # If integration
          [ "${{ github.event_name }}" == "pull_request" ] && VERSION=integration

          echo "image=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Registry
        if: success()
        run: |
          echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY_HOST }} --username "${{ secrets.DOCKER_REGISTRY_USERNAME }}" --password-stdin

      - name: Run Buildx (Build and push to integration)
        if: success()
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 --tag ${{ steps.prepare-variables.outputs.image }}:${{ steps.prepare-variables.outputs.tag }} --output "type=image,push=true" .
